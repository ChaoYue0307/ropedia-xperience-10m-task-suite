<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="920" viewBox="0 0 1420 920">
<rect width="1420" height="920" fill="#fbfaf7"/>
<rect x="28" y="28" width="1364" height="864" rx="18" fill="#fffefd" stroke="#e4ded4"/>
<text x="66" y="88" font-size="32" font-weight="760" fill="#1f2421">Ropedia Xperience-10M: four direction extension probes</text>
<text x="66" y="122" font-size="17" font-weight="500" fill="#6f716c">Data-backed from the same 1,161-window public sample feature tensor; extension probes, not full direction claims.</text>
<rect x="66" y="166" width="620" height="160" rx="10" fill="#fbfaf7" stroke="#e4ded4"/>
<rect x="66" y="166" width="10" height="160" rx="5" fill="#1f6c9f"/>
<circle cx="108" cy="206" r="24" fill="#1f6c9f" opacity="0.14"/>
<text x="98" y="214" font-size="21" font-weight="760" fill="#1f6c9f">A</text>
<text x="142" y="201" font-size="20" font-weight="760" fill="#1f2421">Body/hand motion intensity</text>
<text x="142" y="228" font-size="13" font-weight="650" fill="#6f716c">Human Modeling &amp; Motion Understanding</text>
<text x="142" y="260" font-size="16" font-weight="700" fill="#1f2421">Minimal: 0.7827 macro-F1</text>
<text x="366" y="260" font-size="16" font-weight="700" fill="#1f2421">Neural MLP: 0.7986 macro-F1</text>
<text x="142" y="291" font-size="13" font-weight="500" fill="#4e514c">Binary label: high_motion or low_motion.</text>
<rect x="142" y="304" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="142" y="304" width="344.4" height="8" rx="4" fill="#1f6c9f" opacity="0.72"/>
<rect x="142" y="316" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="142" y="316" width="351.4" height="8" rx="4" fill="#1f2421" opacity="0.72"/>
<rect x="730" y="166" width="620" height="160" rx="10" fill="#fbfaf7" stroke="#e4ded4"/>
<rect x="730" y="166" width="10" height="160" rx="5" fill="#2e7775"/>
<circle cx="772" cy="206" r="24" fill="#2e7775" opacity="0.14"/>
<text x="762" y="214" font-size="21" font-weight="760" fill="#2e7775">B</text>
<text x="806" y="201" font-size="20" font-weight="760" fill="#1f2421">Multi-view consistency retrieval</text>
<text x="806" y="228" font-size="13" font-weight="650" fill="#6f716c">3D/4D Reconstruction &amp; Neural Rendering</text>
<text x="806" y="260" font-size="16" font-weight="700" fill="#1f2421">Minimal: 0.5534 MRR</text>
<text x="1030" y="260" font-size="16" font-weight="700" fill="#1f2421">Neural MLP: 0.3469 MRR</text>
<text x="806" y="291" font-size="13" font-weight="500" fill="#4e514c">Ranked candidate windows; the correct synchronized view should rank near the top.</text>
<rect x="806" y="304" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="806" y="304" width="243.5" height="8" rx="4" fill="#2e7775" opacity="0.72"/>
<rect x="806" y="316" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="806" y="316" width="152.6" height="8" rx="4" fill="#1f2421" opacity="0.72"/>
<rect x="66" y="360" width="620" height="160" rx="10" fill="#fbfaf7" stroke="#e4ded4"/>
<rect x="66" y="360" width="10" height="160" rx="5" fill="#956400"/>
<circle cx="108" cy="400" r="24" fill="#956400" opacity="0.14"/>
<text x="98" y="408" font-size="21" font-weight="760" fill="#956400">C</text>
<text x="142" y="395" font-size="20" font-weight="760" fill="#1f2421">Action phase progress</text>
<text x="142" y="422" font-size="13" font-weight="650" fill="#6f716c">Egocentric Vision &amp; Interaction</text>
<text x="142" y="454" font-size="16" font-weight="700" fill="#1f2421">Minimal: 0.3416 MAE</text>
<text x="366" y="454" font-size="16" font-weight="700" fill="#1f2421">Neural MLP: 0.3038 MAE</text>
<text x="142" y="485" font-size="13" font-weight="500" fill="#4e514c">A scalar progress value between 0.0 and 1.0 for the current action segment.</text>
<rect x="142" y="498" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="142" y="498" width="289.7" height="8" rx="4" fill="#956400" opacity="0.72"/>
<rect x="142" y="510" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="142" y="510" width="306.3" height="8" rx="4" fill="#1f2421" opacity="0.72"/>
<rect x="730" y="360" width="620" height="160" rx="10" fill="#fbfaf7" stroke="#e4ded4"/>
<rect x="730" y="360" width="10" height="160" rx="5" fill="#346538"/>
<circle cx="772" cy="400" r="24" fill="#346538" opacity="0.14"/>
<text x="762" y="408" font-size="21" font-weight="760" fill="#346538">D</text>
<text x="806" y="395" font-size="20" font-weight="760" fill="#1f2421">Short-horizon ego-motion forecast</text>
<text x="806" y="422" font-size="13" font-weight="650" fill="#6f716c">Scene Reconstruction &amp; World Modeling</text>
<text x="806" y="454" font-size="16" font-weight="700" fill="#1f2421">Minimal: 0.1989 MAE</text>
<text x="1030" y="454" font-size="16" font-weight="700" fill="#1f2421">Neural MLP: 0.0989 MAE</text>
<text x="806" y="485" font-size="13" font-weight="500" fill="#4e514c">A future camera-translation delta vector.</text>
<rect x="806" y="498" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="806" y="498" width="352.5" height="8" rx="4" fill="#346538" opacity="0.72"/>
<rect x="806" y="510" width="440" height="8" rx="4" fill="#eee8df"/>
<rect x="806" y="510" width="396.5" height="8" rx="4" fill="#1f2421" opacity="0.72"/>
<text x="66" y="570" font-size="24" font-weight="760" fill="#1f2421">How to read this</text>
<text x="66" y="604" font-size="16" font-weight="500" fill="#4e514c">Each card adds one concrete task to a research direction using existing sample modalities.</text>
<text x="66" y="632" font-size="16" font-weight="500" fill="#4e514c">Colored bar: minimal baseline normalized score. Dark bar: neural MLP normalized score. Lower-is-better MAE is shown as 1 - MAE for bar length only.</text>
<line x1="66" y1="675" x2="1354" y2="675" stroke="#e4ded4"/>
<text x="66" y="724" font-size="22" font-weight="760" fill="#1f2421">Implementation boundary</text>
<text x="66" y="758" font-size="16" font-weight="500" fill="#4e514c">A: motion-energy proxy, not a full human body model. B: view-feature retrieval, not neural rendering.</text>
<text x="66" y="786" font-size="16" font-weight="500" fill="#4e514c">C: phase-progress regression, not open-world intent. D: ego-motion forecast, not a persistent map.</text>
<text x="66" y="835" font-size="16" font-weight="700" fill="#1f2421">All metrics are computed from held-out chronological windows of the same public sample episode.</text>
</svg>